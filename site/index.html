<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MotionHub — 效果预览</title>
<style>
  :root{
    --ink:#0a0a0f; --panel:#14141c; --panel-2:#1a1a26; --line:rgba(255,255,255,.10);
    --text:#e8e8f0; --muted:#9a9ab0; --faint:#63637a;
    --accent:#7c5cff; --accent-hover:#6a4cf0; --accent2:#00e0c6;
    --radius:18px; --maxw:1160px; --stage:#07070d;
    --bg:radial-gradient(1100px 560px at 72% -12%,#1a1533 0%,transparent 60%),var(--ink);
  }
  :root[data-theme="light"]{
    --ink:#f5f4fb; --panel:#ffffff; --panel-2:#f2f0fa; --line:rgba(20,10,50,.10);
    --text:#17162a; --muted:#55546b; --faint:#8a89a0;
    --accent:#6a49ff; --accent-hover:#5838f0; --accent2:#00a892; --stage:#0a0a12;
    --bg:radial-gradient(1100px 560px at 72% -12%,#e7e1ff 0%,transparent 60%),var(--ink);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
  header{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--ink) 72%,transparent);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;gap:18px;height:60px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.02em;font-size:17px}
  .mark{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 14px -4px var(--accent)}
  nav.links{display:none;gap:20px;margin-left:6px;font-size:14px;color:var(--muted)}
  nav.links a:hover{color:var(--text)}
  .spacer{margin-left:auto}
  .ctl{display:flex;align-items:center;gap:10px}
  .chip{border:1px solid var(--line);background:transparent;color:var(--text);padding:6px 11px;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s}
  .chip:hover{background:color-mix(in srgb,var(--text) 7%,transparent)}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media(min-width:720px){nav.links{display:flex}}
  .hero{margin-top:26px;border:1px solid var(--line);border-radius:28px;background:linear-gradient(150deg,#1a1533,#0f0f18);padding:52px 40px;position:relative;overflow:hidden}
  :root[data-theme="light"] .hero{background:linear-gradient(150deg,#ece8ff,#f7f5ff)}
  .hero h1{margin:0;font-size:clamp(30px,5vw,50px);line-height:1.04;letter-spacing:-.03em;text-wrap:balance;max-width:16ch}
  .hero p{margin:16px 0 0;color:var(--muted);font-size:clamp(15px,2.2vw,18px);max-width:56ch;line-height:1.5}
  .btns{display:flex;flex-wrap:wrap;gap:12px;margin-top:24px}
  .btn{font-family:inherit;font-size:14px;font-weight:600;padding:11px 18px;border-radius:11px;cursor:pointer;border:1px solid transparent;transition:background .15s,border-color .15s,transform .1s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-hover)}
  .btn-ghost{background:transparent;border-color:var(--line);color:var(--text)}
  .btn-ghost:hover{background:color-mix(in srgb,var(--text) 6%,transparent)}
  .btn:active{transform:translateY(1px)}
  .note-box{margin-top:20px;border:1px dashed color-mix(in srgb,var(--accent) 50%,var(--line));border-radius:14px;background:color-mix(in srgb,var(--accent) 8%,var(--panel));padding:13px 16px;font-size:13.5px;color:var(--muted);line-height:1.55}
  .note-box b{color:var(--text)}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:14px;margin:44px 0 18px}
  .sec-head h2{margin:0;font-size:20px;letter-spacing:-.01em}
  .eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .grid{display:grid;grid-template-columns:1fr;gap:20px}
  @media(min-width:640px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(min-width:960px){.grid{grid-template-columns:repeat(3,1fr)}}
  .card{text-align:left;padding:0;cursor:pointer;font-family:inherit;color:inherit;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-4px);box-shadow:0 22px 50px -22px color-mix(in srgb,var(--accent) 60%,transparent);border-color:color-mix(in srgb,var(--accent) 45%,transparent)}
  .card:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .stage{aspect-ratio:16/10;position:relative;background:var(--stage);overflow:hidden}
  .stage>canvas{position:absolute;inset:0}
  .stage .scrim{position:absolute;left:0;right:0;bottom:0;height:52%;background:linear-gradient(to top,rgba(4,4,10,.7),transparent);pointer-events:none}
  .stage .ttl{position:absolute;left:15px;bottom:12px;font-weight:600;color:#fff;font-size:15px;text-shadow:0 1px 12px rgba(0,0,0,.6);pointer-events:none}
  .badge{position:absolute;top:12px;font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600;pointer-events:none}
  .badge.free{right:12px;background:rgba(255,255,255,.16);color:#fff;backdrop-filter:blur(4px)}
  .badge.premium{right:12px;background:var(--accent);color:#fff}
  .badge.live{left:12px;background:rgba(0,0,0,.5);color:#fff;font-weight:500;display:flex;align-items:center;gap:6px}
  .badge.live .dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
  .body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
  .body h3{margin:0;font-size:15.5px;letter-spacing:-.01em}
  .body p{margin:0;font-size:13px;color:var(--muted);line-height:1.45}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}
  .tag{font-size:11px;color:var(--faint);background:color-mix(in srgb,var(--text) 6%,transparent);padding:2px 8px;border-radius:7px}
  .price-grid{display:grid;grid-template-columns:1fr;gap:16px}
  @media(min-width:760px){.price-grid{grid-template-columns:repeat(3,1fr)}}
  .price{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);padding:22px;display:flex;flex-direction:column;gap:12px}
  .price.hot{border-color:color-mix(in srgb,var(--accent) 55%,transparent);background:color-mix(in srgb,var(--accent) 12%,var(--panel))}
  .price h3{margin:0;font-size:16px}
  .price ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px}
  .price li{display:flex;gap:9px;font-size:13.5px;color:var(--muted)}
  .price li::before{content:"✓";color:var(--accent2);font-weight:700}
  footer{margin:56px 0 40px;padding-top:22px;border-top:1px solid var(--line);color:var(--faint);font-size:13px;line-height:1.6}
  .overlay{position:fixed;inset:0;z-index:100;display:none}
  .overlay.open{display:block}
  .scrim2{position:absolute;inset:0;background:rgba(4,4,10,.74);backdrop-filter:blur(6px)}
  .sheet{position:absolute;inset:24px;margin:auto;max-width:760px;max-height:calc(100% - 48px);overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 40px 100px -30px rgba(0,0,0,.7)}
  .sheet .hd{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:color-mix(in srgb,var(--panel) 88%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .sheet .hd button{color:var(--muted);font-size:14px;cursor:pointer;background:none;border:none;font-family:inherit}
  .sheet .hd button:hover{color:var(--text)}
  .bigstage{position:relative;aspect-ratio:20/9;background:var(--stage);overflow:hidden}
  .bigstage .lbl{position:absolute;left:20px;bottom:16px;color:#fff;font-size:22px;font-weight:600;letter-spacing:-.02em;text-shadow:0 2px 16px rgba(0,0,0,.6);pointer-events:none}
  .bigstage .hint{position:absolute;right:16px;top:14px;font-size:12px;color:#fff;background:rgba(0,0,0,.45);padding:4px 10px;border-radius:999px;pointer-events:none}
  .content{padding:20px 22px 26px;display:flex;flex-direction:column;gap:14px}
  .content .lead{color:var(--muted);font-size:15px;line-height:1.5;margin:0}
  .prompt-box{border:1px solid var(--line);background:color-mix(in srgb,#000 26%,var(--panel));border-radius:14px;padding:16px}
  .prompt-box .row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
  .prompt-box .lbl{font-size:13px;font-weight:600;color:var(--muted)}
  .prompt-box pre{margin:0;white-space:pre-wrap;word-break:break-word;font-size:13.5px;line-height:1.6;font-family:ui-monospace,Menlo,monospace}
  .prompt-box .hint{margin:10px 0 0;font-size:12px;color:var(--faint)}
  .locked pre{filter:blur(6px);user-select:none}
  .unlock{border:1px solid var(--line);background:var(--panel-2);border-radius:12px;padding:16px;margin-top:14px}
  .unlock h4{margin:0 0 4px;font-size:15px}
  .unlock p{margin:0 0 12px;font-size:13px;color:var(--muted)}
  .note{font-size:12.5px;color:var(--accent2)}
  .copybtn{background:var(--accent);color:#fff;border:none;font-family:inherit;font-weight:600;font-size:13px;padding:7px 14px;border-radius:9px;cursor:pointer}
  .copybtn:hover{background:var(--accent-hover)}
  .liquid-glass{background:rgba(255,255,255,.04);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:none;box-shadow:inset 0 1px 1px rgba(255,255,255,.14);position:relative;overflow:hidden}
  .liquid-glass::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.4px;background:linear-gradient(180deg,rgba(255,255,255,.45) 0%,rgba(255,255,255,.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,.15) 80%,rgba(255,255,255,.45) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
  @keyframes fadeSlideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto;animation:none!important}}
</style>

<header>
  <div class="wrap bar">
    <a class="logo" href="#top"><span class="mark"></span><span>MotionHub</span></a>
    <nav class="links"><a href="#gallery" data-t="nav.gallery"></a><a href="#pricing" data-t="nav.pricing"></a></nav>
    <span class="spacer"></span>
    <div class="ctl">
      <button class="chip" id="langBtn"></button>
      <button class="chip" id="themeBtn" aria-label="theme">◐</button>
    </div>
  </div>
</header>

<main class="wrap" id="top">
  <section class="hero">
    <h1 data-t="home.heroTitle"></h1>
    <p data-t="home.heroSub"></p>
    <div class="btns">
      <a class="btn btn-primary" href="#gallery" data-t="home.browse"></a>

  <div class="scrim2" data-close></div>
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="hd"><button data-close id="backBtn"></button><button data-close aria-label="close">✕</button></div>
    <div class="bigstage" id="bigStage"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
"use strict";
const RM = matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---------- tiny engine ---------- */
function mkCanvas(host, dprCap){
  const c=document.createElement("canvas");
  c.style.cssText="width:100%;height:100%;display:block";
  host.appendChild(c);
  const ctx=c.getContext("2d");
  const DPR=Math.min(devicePixelRatio||1, dprCap||2);
  let w=0,h=0;
  function size(){
    const r=host.getBoundingClientRect();
    const nw=Math.max(1,Math.round(r.width)), nh=Math.max(1,Math.round(r.height));
    if(nw!==w||nh!==h){w=nw;h=nh;c.width=w*DPR;c.height=h*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
    return {w,h};
  }
  size();
  return {canvas:c,ctx,size};
}
function loop(fn){
  if(RM){ fn(16,0); return ()=>{}; }
  let raf, last=performance.now(), acc=0;
  (function go(now){ let dt=now-last; if(dt>50)dt=50; last=now; acc+=dt; fn(dt,acc); raf=requestAnimationFrame(go); })(last);
  return ()=>cancelAnimationFrame(raf);
}

/* ---------- effects (all hand-written, no deps) ---------- */
function aurora(host){
  const {ctx,size}=mkCanvas(host);
  const blobs=[[124,92,255],[0,224,198],[255,138,212],[90,110,255]];
  return loop((dt,t)=>{
    const {w,h}=size(); ctx.clearRect(0,0,w,h); ctx.globalCompositeOperation="lighter";
    const T=t*0.0006;
    blobs.forEach((c,i)=>{
      const x=w*(0.5+0.4*Math.sin(T*(0.7+i*0.13)+i));
      const y=h*(0.5+0.4*Math.cos(T*(0.6+i*0.17)+i*1.7));
      const r=Math.max(w,h)*0.6;
      const g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0.5)`); g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    });
    ctx.globalCompositeOperation="source-over";
  });
}
function constellation(host,{big}={}){
  const {ctx,size}=mkCanvas(host);
  const N=big?70:36;
  const pts=Array.from({length:N},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*8e-5,vy:(Math.random()-.5)*8e-5}));
  const m={x:-1,y:-1};
  const move=e=>{const r=host.getBoundingClientRect();m.x=(e.clientX-r.left)/r.width;m.y=(e.clientY-r.top)/r.height;};
  const leave=()=>{m.x=-1;m.y=-1;};
  host.addEventListener("pointermove",move); host.addEventListener("pointerleave",leave);
  const R=big?120:70;
  const stop=loop((dt)=>{
    const {w,h}=size(); ctx.clearRect(0,0,w,h);
    for(const p of pts){
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      if(p.x<0||p.x>1)p.vx*=-1; if(p.y<0||p.y>1)p.vy*=-1;
      if(m.x>=0){const dx=m.x-p.x,dy=m.y-p.y,d=Math.hypot(dx,dy);if(d<0.28){p.vx+=dx*6e-7*dt;p.vy+=dy*6e-7*dt;}}
    }
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const a=pts[i],b=pts[j],dx=(a.x-b.x)*w,dy=(a.y-b.y)*h,d=Math.hypot(dx,dy);
      if(d<R){ctx.strokeStyle=`rgba(124,92,255,${(1-d/R)*0.5})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(a.x*w,a.y*h);ctx.lineTo(b.x*w,b.y*h);ctx.stroke();}
    }
    ctx.fillStyle="rgba(0,224,198,0.9)";
    for(const p of pts){ctx.beginPath();ctx.arc(p.x*w,p.y*h,big?2.2:1.6,0,7);ctx.fill();}
  });
  return ()=>{stop();host.removeEventListener("pointermove",move);host.removeEventListener("pointerleave",leave);};
}
function plasma(host,{big}={}){
  const NW=big?170:110, NH=big?96:70;
  const c=document.createElement("canvas"); c.width=NW;c.height=NH;
  c.style.cssText="width:100%;height:100%;display:block;image-rendering:auto";
  host.appendChild(c); const ctx=c.getContext("2d"); const img=ctx.createImageData(NW,NH);
  function draw(t){
    const T=t*0.001, d=img.data;
    for(let y=0;y<NH;y++)for(let x=0;x<NW;x++){
      const v=Math.sin(x*0.06+T)+Math.sin(y*0.07-T*0.8)+Math.sin((x+y)*0.05+T*0.5)+Math.sin(Math.hypot(x-NW/2,y-NH/2)*0.07-T*1.2);
      const a=(v+4)/8, i=(y*NW+x)*4;
      d[i]=30+a*105; d[i+1]=15+(1-a)*185; d[i+2]=120+a*135; d[i+3]=255;
    }
    ctx.putImageData(img,0,0);
  }
  return loop((dt,t)=>draw(t));
}
function scramble(host,{big}={}){
  const words=["MOTION","REMIX","SHADER","SCROLL","WEBGL"];
  const el=document.createElement("div");
  el.style.cssText=`position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;font-weight:700;letter-spacing:.1em;color:#e8e8f0;font-size:${big?"46px":"24px"}`;
  host.appendChild(el);
  const chars="!<>-_\\/[]{}=+*^?#________";
  if(RM){ el.textContent=words[0]; return ()=>host.removeChild(el); }
  let alive=true, wi=0;
  function setWord(target){
    return new Promise(res=>{
      const len=Math.max((el.textContent||"").length,target.length), q=[];
      for(let i=0;i<len;i++){const s=Math.floor(Math.random()*18);q.push({to:target[i]||"",s,e:s+8+Math.floor(Math.random()*16)});}
      let f=0;(function frame(){if(!alive)return;let out="",done=0;
        for(const it of q){if(f>=it.e){out+=it.to;done++;}else if(f>=it.s){out+=chars[Math.floor(Math.random()*chars.length)];}}
        el.textContent=out; if(done===q.length){res();return;} f++; requestAnimationFrame(frame);})();
    });
  }
  (async()=>{while(alive){await setWord(words[wi++%words.length]);await new Promise(r=>setTimeout(r,1100));}})();
  return ()=>{alive=false;host.removeChild(el);};
}
function marquee(host,{big}={}){
  const wrap=document.createElement("div");
  wrap.style.cssText="position:absolute;inset:0;overflow:hidden;perspective:640px;display:flex;align-items:center";
  const row=document.createElement("div");
  row.style.cssText="display:flex;gap:14px;will-change:transform";
  const grads=["#7c5cff,#00e0c6","#1e6fff,#5ac8fa","#a24bff,#ff5ca8","#0f9b8e,#7cf0d6","#ff5c7a,#ffb37c"];
  const tw=big?120:80, th=big?150:98;
  const tile=g=>{const d=document.createElement("div");d.style.cssText=`flex:0 0 auto;width:${tw}px;height:${th}px;border-radius:12px;background:linear-gradient(135deg,${g});box-shadow:0 10px 30px -10px rgba(0,0,0,.55)`;return d;};
  const set=[...grads,...grads,...grads]; set.forEach(g=>row.appendChild(tile(g)));
  wrap.appendChild(row); host.appendChild(wrap);
  const oneSet=grads.length*(tw+14);
  let x=0; const stop=loop((dt)=>{x-=dt*(big?0.06:0.045); if(x<=-oneSet)x+=oneSet; row.style.transform=`translateX(${x}px) rotateY(-22deg) rotateX(4deg)`;});
  return ()=>{stop();host.removeChild(wrap);};
}
function magnetic(host,{big}={}){
  const wrap=document.createElement("div"); wrap.style.cssText="position:absolute;inset:0;display:flex;align-items:center;justify-content:center";
  const btn=document.createElement("button"); btn.textContent=big?"Hover me":"Hover";
  btn.style.cssText=`font-family:inherit;font-weight:600;font-size:${big?"16px":"13px"};color:#fff;background:linear-gradient(135deg,#7c5cff,#6a4cf0);border:none;padding:${big?"14px 28px":"10px 18px"};border-radius:999px;cursor:pointer;will-change:transform;box-shadow:0 12px 32px -8px #7c5cff`;
  wrap.appendChild(btn); host.appendChild(wrap);
  let tx=0,ty=0,cx=0,cy=0,raf; const range=big?140:80, k=big?0.4:0.32;
  const move=e=>{const r=btn.getBoundingClientRect(),bx=r.left+r.width/2,by=r.top+r.height/2,dx=e.clientX-bx,dy=e.clientY-by;if(Math.hypot(dx,dy)<range){tx=dx*k;ty=dy*k;}else{tx=0;ty=0;}};
  const leave=()=>{tx=0;ty=0;};
  host.addEventListener("pointermove",move); host.addEventListener("pointerleave",leave);
  (function spring(){cx+=(tx-cx)*0.15;cy+=(ty-cy)*0.15;btn.style.transform=`translate(${cx.toFixed(2)}px,${cy.toFixed(2)}px)`;raf=requestAnimationFrame(spring);})();
  return ()=>{cancelAnimationFrame(raf);host.removeEventListener("pointermove",move);host.removeEventListener("pointerleave",leave);host.removeChild(wrap);};
}
function gooey(host,{big}={}){
  const {canvas,ctx,size}=mkCanvas(host,1);
  const N=big?8:6;
  const balls=Array.from({length:N},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*3e-4,vy:(Math.random()-.5)*3e-4,r:(big?46:30)*(0.6+Math.random()*0.7)}));
  const off=document.createElement("canvas"), octx=off.getContext("2d");
  return loop((dt)=>{

SCOVER IT' Anton, clamp(20px,4vw,56px), white, uppercase, followed by ArrowRight.\n\nBehavior: clicking arrows rotates roles; background, positions, scales, blurs and opacities all crossfade together over 650ms.",

/* ---------- render ---------- */
let lang=(navigator.language||"en").toLowerCase().startsWith("zh")?"zh":"en";
const t=k=>DICT[lang][k];
const unlocked=new Set();
const running=new Map(); // stage el -> stop fn
let io;

function applyStatic(){
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-t]").forEach(el=>{const v=DICT[lang][el.getAttribute("data-t")];if(typeof v==="string")el.textContent=v;});
  document.getElementById("langBtn").textContent=t("lang");
  document.getElementById("noteBox").innerHTML=t("note");
  document.getElementById("count").textContent=DEMOS.length+(lang==="zh"?" 个":"");
}
function startStage(stage){ if(running.has(stage))return; const d=DEMOS[+stage.dataset.i]; running.set(stage, d.fn(stage,{big:false})); }
function stopStage(stage){ const s=running.get(stage); if(s){s();running.delete(stage);} while(stage.firstChild&&stage.firstChild.tagName!=="SPAN"&&!stage.firstChild.className) stage.removeChild(stage.firstChild); rebuildOverlay(stage); }
function rebuildOverlay(stage){ /* overlays are rebuilt in renderGrid; keep simple */ }

function renderGrid(){
  const grid=document.getElementById("grid");
  if(io) io.disconnect(); running.forEach(s=>s()); running.clear();
  grid.innerHTML="";
  io=new IntersectionObserver(es=>es.forEach(e=>{ e.isIntersecting?startStage(e.target):stopStage(e.target); }),{rootMargin:"120px"});
  DEMOS.forEach((d,i)=>{
    const card=document.createElement("button"); card.className="card";
    const stage=document.createElement("div"); stage.className="stage"; stage.dataset.i=i;
    stage.innerHTML=`<div class="scrim"></div>
      <span class="badge live"><span class="dot"></span>${t("live")}</span>
      <span class="badge ${d.premium?"premium":"free"}">${d.premium?t("card.premium"):t("card.free")}</span>
      <span class="ttl">${lang==="zh"?d.titleZh:d.titleEn}</span>`;
    const body=document.createElement("div"); body.className="body";
    body.innerHTML=`<h3>${lang==="zh"?d.titleZh:d.titleEn}</h3><p>${lang==="zh"?d.sumZh:d.sumEn}</p>
      <div class="tags">${d.tags.map(x=>`<span class="tag">${x}</span>`).join("")}</div>`;
    card.appendChild(stage); card.appendChild(body);
    card.addEventListener("click",()=>openDemo(i));
    grid.appendChild(card);
    io.observe(stage);
  });
}
function renderPricing(){
  const cols=[{t:t("pricing.freeT"),l:t("pricing.free"),hot:false},{t:t("pricing.premiumT"),l:t("pricing.premium"),hot:true},{t:t("pricing.creatorT"),l:t("pricing.creator"),hot:false}];
  document.getElementById("priceGrid").innerHTML=cols.map(c=>`<div class="price ${c.hot?"hot":""}"><h3>${c.t}</h3><ul>${c.l.map(x=>`<li>${x}</li>`).join("")}</ul></div>`).join("");
}

/* ---------- detail ---------- */
let bigStop=null;
function openDemo(i){
  const d=DEMOS[i];
  const title=lang==="zh"?d.titleZh:d.titleEn, sum=lang==="zh"?d.sumZh:d.sumEn, prompt=lang==="zh"?d.promptZh:d.promptEn;
  const isUnlocked=!d.premium||unlocked.has(d.id);
  const bs=document.getElementById("bigStage");
  if(bigStop){bigStop();bigStop=null;} bs.innerHTML="";
  bigStop=d.fn(bs,{big:true,interactive:d.interactive});
  bs.insertAdjacentHTML("beforeend",`<div class="lbl">${title}</div>${d.interactive?`<div class="hint">${t("interact")}</div>`:""}`);
  document.getElementById("backBtn").textContent="← "+t("nav.gallery");

  const c=document.getElementById("content"); c.innerHTML="";
  const lead=document.createElement("p"); lead.className="lead"; lead.textContent=sum; c.appendChild(lead);
  const box=document.createElement("div"); box.className="prompt-box"+(isUnlocked?"":" locked");
  box.innerHTML=`<div class="row"><span class="lbl">${t("demo.promptTitle")}</span>${isUnlocked?`<button class="copybtn" id="copyBtn">${t("demo.copyPrompt")}</button>`:""}</div>
    <pre>${escapeHtml(isUnlocked?prompt:prompt.slice(0,150)+" …")}</pre>${isUnlocked?`<p class="hint">${t("demo.promptHint")}</p>`:""}`;
  c.appendChild(box);
  if(isUnlocked){
    const n=document.createElement("p"); n.className="note"; n.textContent=t("signedNote"); c.appendChild(n);
    box.querySelector("#copyBtn").addEventListener("click",e=>{navigator.clipboard&&navigator.clipboard.writeText(prompt).catch(()=>{});e.target.textContent=t("demo.copied");setTimeout(()=>e.target.textContent=t("demo.copyPrompt"),1500);});
  }else{
    const u=document.createElement("div"); u.className="unlock";
    u.innerHTML=`<h4>${t("demo.unlockTitle")}</h4><p>${t("demo.unlockSub")}</p><button class="btn btn-primary" id="unlockBtn">${t("unlockCta")} ${d.price}</button>`;
    c.appendChild(u);
    u.querySelector("#unlockBtn").addEventListener("click",()=>{unlocked.add(d.id);openDemo(i);});
  }
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeDemo(){ document.getElementById("overlay").classList.remove("open"); document.body.style.overflow=""; if(bigStop){bigStop();bigStop=null;} document.getElementById("bigStage").innerHTML=""; }
function escapeHtml(s){return s.replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));}

document.querySelectorAll("[data-close]").forEach(el=>el.addEventListener("click",closeDemo));
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDemo();});
document.getElementById("langBtn").addEventListener("click",()=>{lang=lang==="zh"?"en":"zh";renderAll();});
function currentTheme(){return document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");}
document.getElementById("themeBtn").addEventListener("click",()=>document.documentElement.setAttribute("data-theme",currentTheme()==="dark"?"light":"dark"));

function renderAll(){ closeDemo(); applyStatic(); renderGrid(); renderPricing(); }
renderAll();
</script>
